name: CI

on:
  push:
    branches: [main]
    paths:
      - "components/**"
      - "cmake/**"
      - "examples/**"
      - "blusys"
      - "scripts/scaffold/**"
      - "scripts/**"
      - "inventory.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "api-docs/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "components/**"
      - "cmake/**"
      - "examples/**"
      - "blusys"
      - "scripts/scaffold/**"
      - "scripts/**"
      - "inventory.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "api-docs/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IDF_CCACHE_ENABLE: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Tier 0: Layer Invariants ───────────────────────────────────────────────
  blusys-layer-invariants:
    name: "Layer invariants"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rule 1-4 — Layering lint (no cross-layer includes)
        shell: bash
        run: bash scripts/lint-layering.sh

      - name: Rule 5 — src/ mirrors include/blusys/
        run: python3 scripts/check-src-include-mirror.py

      - name: Rule 6 — No blusys_ prefix in file basenames
        run: python3 scripts/check-no-blusys-prefix.py

      - name: Rule 7 — C++ framework files in namespace blusys
        run: python3 scripts/check-cpp-namespace.py

      # ── Tier 0: refactor guards ──────────────────────────────────────────
      - name: Lint — no `ctx.services()` locator
        run: bash scripts/check-no-service-locator.sh

      - name: Lint — no `#ifdef ESP_PLATFORM` above HAL
        run: bash scripts/check-no-platform-ifdef-above-hal.sh

      - name: Lint — examples import only <blusys.hpp>
        run: bash scripts/check-public-api.sh

      - name: Lint — capability files follow header + _host + _device shape
        run: bash scripts/check-capability-shape.sh

      - name: Lint — services only reached via capabilities/runtime/test
        run: bash scripts/check-service-access.sh

  # ── Tier 0: Layering Lint (legacy checks) ─────────────────────────────────
  lint:
    name: "Layering lint"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Framework UI CMake source lists
        run: python3 scripts/check-framework-ui-sources.py

      - name: Host bridge spine vs component CMakeLists
        run: python3 scripts/check-host-bridge-spine.py

  # ── Tier 0: Inventory Validation ───────────────────────────────────────────
  inventory:
    name: "Inventory check"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate inventory
        run: python scripts/check-inventory.py

      - name: Product app main/ layout
        run: python scripts/check-product-layout.py

  # ── Tier 0: Host harness smokes (Linux + SDL2 deps) ───────────────────────
  host-smoke:
    name: "Host harness smoke"
    needs: [lint, blusys-layer-invariants]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-host-deps-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-host-deps-${{ runner.os }}-

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config libsdl2-dev libmosquitto-dev

      - name: Configure and build host smoke targets
        shell: bash
        run: |
          set -euo pipefail
          cmake -S scripts/host -B scripts/host/build-host-ci
          cmake --build scripts/host/build-host-ci -j \
            --target handheld_starter_reducer_smoke \
                     panel_connectivity_map_smoke \
                     capability_contract_smoke \
                     operational_phase_smoke \
                     host_spine_test \
                     action_queue_drop_smoke \
                     snapshot_buffer_smoke
          export BLUSYS_PATH="${GITHUB_WORKSPACE}"
          cmake -S examples/quickstart/headless/host -B examples/quickstart/headless/build-host-ci
          cmake --build examples/quickstart/headless/build-host-ci -j
          cmake -S examples/external/host -B examples/external/build-host-ci
          cmake --build examples/external/build-host-ci -j

      - name: Run host smoke binaries
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/host/build-host-ci/handheld_starter_reducer_smoke
          ./scripts/host/build-host-ci/panel_connectivity_map_smoke
          ./scripts/host/build-host-ci/capability_contract_smoke
          ./scripts/host/build-host-ci/operational_phase_smoke
          ./scripts/host/build-host-ci/host_spine_test
          ./scripts/host/build-host-ci/action_queue_drop_smoke
          ./scripts/host/build-host-ci/snapshot_buffer_smoke
          cd scripts/host/build-host-ci && ctest --output-on-failure

      - name: Host spine tests (sanitizer)
        shell: bash
        run: |
          set -euo pipefail
          cmake -S scripts/host -B scripts/host/build-host-san -DBLUSYS_HOST_SANITIZE=ON
          cmake --build scripts/host/build-host-san -j --target host_spine_test action_queue_drop_smoke snapshot_buffer_smoke
          ./scripts/host/build-host-san/host_spine_test
          ./scripts/host/build-host-san/action_queue_drop_smoke
          ./scripts/host/build-host-san/snapshot_buffer_smoke

      - name: Scaffold smoke (blusys create × interface/capability matrix + host-build)
        shell: bash
        env:
          BLUSYS_PATH: ${{ github.workspace }}
        run: |
          chmod +x scripts/scaffold-smoke.sh blusys
          scripts/scaffold-smoke.sh

  # ── Tier 0: Minimal host test (no SDL / no mosquitto / no LVGL) ───────────
  # Fast iteration loop — compiles and runs every headless test under
  # scripts/host-test/ using only libc / libstdc++ / libm. Much faster than
  # host-smoke because it skips the SDL2 and libmosquitto toolchains.
  host-test-minimal:
    name: "Host test (minimal)"
    needs: [blusys-layer-invariants]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Configure + build headless test harness
        shell: bash
        run: |
          set -euo pipefail
          cmake -S scripts/host-test -B build-host-test -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-host-test -j

      - name: Run headless tests
        shell: bash
        run: ctest --test-dir build-host-test --output-on-failure

  # ── Tier 0: Docs Build ────────────────────────────────────────────────────
  docs:
    name: "Docs build"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

  # ── Tier 0: API Reference Build (Doxygen, strict) ─────────────────────────
  # Enforces that every exported symbol in the migrated public headers is
  # documented. WARN_AS_ERROR=FAIL_ON_WARNINGS in api-docs/Doxyfile turns
  # missing @brief / malformed @param / etc. into a non-zero exit.
  # INPUT in the Doxyfile scopes which headers are checked — widen as each
  # module migrates to inline doxygen comments.
  api-docs:
    name: "API reference build"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen

      - name: Build API reference (strict)
        run: doxygen api-docs/Doxyfile

  # ── Tier 1: Build Curated Examples ─────────────────────────────────────────
  build:
    name: "Build PR (${{ matrix.target }})"
    needs: [lint, blusys-layer-invariants, inventory, host-smoke, host-test-minimal]
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32c3, esp32s3]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up ESP-IDF environment
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          idf.py --version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.target }}-${{ hashFiles('components/**/*.c', 'components/**/*.h') }}
          restore-keys: |
            ccache-${{ matrix.target }}-

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Build curated examples (ci_pr=true)
        shell: bash
        run: |
          chmod +x blusys
          blusys build-inventory "${{ matrix.target }}" ci_pr

      - name: ccache stats
        if: always()
        run: ccache -s 2>/dev/null || true

  display-variants:
    name: "Display variants (${{ matrix.target }})"
    needs: [lint, blusys-layer-invariants, inventory, host-smoke, host-test-minimal]
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32c3, esp32s3]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up ESP-IDF environment
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          idf.py --version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-display-variants-${{ hashFiles('components/**/*.c', 'components/**/*.h') }}
          restore-keys: |
            ccache-display-variants-

      - name: Build display variant matrix
        shell: bash
        run: |
          chmod +x scripts/build-display-variants.sh
          scripts/build-display-variants.sh "${{ matrix.target }}"

      - name: ccache stats
        if: always()
        run: ccache -s 2>/dev/null || true

  # ── Tier 2: QEMU Smoke Tests (reduced) ────────────────────────────────────
  qemu:
    name: "QEMU smoke (${{ matrix.target }})"
    needs: [build, display-variants]
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32c3, esp32s3]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up ESP-IDF environment
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          idf.py --version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.target }}-${{ hashFiles('components/**/*.c', 'components/**/*.h') }}
          restore-keys: |
            ccache-${{ matrix.target }}-

      - name: Restore QEMU tools
        id: qemu-cache
        uses: actions/cache@v4
        with:
          path: ~/.espressif/tools/qemu-*
          key: qemu-tools-idf-v5.5.4

      - name: Install QEMU
        if: steps.qemu-cache.outputs.cache-hit != 'true'
        run: python $IDF_PATH/tools/idf_tools.py --non-interactive install qemu-xtensa qemu-riscv32

      - name: Export QEMU to PATH
        run: |
          eval "$(python $IDF_PATH/tools/idf_tools.py export)"
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          qemu-system-xtensa --version
          qemu-system-riscv32 --version

      - name: Run QEMU smoke tests
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/qemu-test.sh

          TARGET="${{ matrix.target }}"
          pass=0
          fail=0

          run_test() {
              local example="$1" timeout="$2" pattern="$3"

              printf '::group::QEMU %s / %s\n' "$example" "$TARGET"
              if scripts/qemu-test.sh "examples/$example" "$TARGET" "$timeout" "$pattern"; then
                  ((pass++)) || true
              else
                  printf '::error::QEMU test failed: %s / %s\n' "$example" "$TARGET"
                  ((fail++)) || true
              fi
              printf '::endgroup::\n'
          }

          run_test validation/platform_lab       15 "status_ok_string: OK"
          run_test validation/hal_io_lab         15 "free_heap_bytes:"

          printf '\n=== QEMU Results for %s ===\n' "$TARGET"
          printf 'Pass: %d  Fail: %d  Total: %d\n' "$pass" "$fail" "$((pass + fail))"
          [ "$fail" -gt 0 ] && exit 1 || exit 0
