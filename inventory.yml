# inventory.yml — single source of truth for support tiers, example taxonomy, and doc classification
#
# This manifest drives CI gating, doc coverage checks, and example health validation.
# Every module, example, and doc page must have an entry here.
#
# Fields:
#   modules[].tier:      hal | driver | service | framework
#   modules[].support:   supported | advanced | internal | deprecated
#   examples[].category: quickstart | reference | validation
#   examples[].visibility: public | internal
#   examples[].layout_exempt: optional bool — skip scripts/check-product-layout.py for this example
#   examples[].product_layout: optional bool — force layout check (e.g. validation app using blusys::app)
#   docs[].section:      start | app | services | hal_drivers | internals

# ---------------------------------------------------------------------------
