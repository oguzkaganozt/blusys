site_name: Blusys HAL
site_description: Simplified ESP32 HAL on top of ESP-IDF v5.5
site_url: https://oguzkaganozt.github.io/blusys/
site_dir: site
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
nav:
  - Overview: index.md
  - Get Started: guides/getting-started.md
  - Guides:
      - System: guides/system-info.md
      - GPIO: guides/gpio-basic.md
      - UART: guides/uart-loopback.md
      - I2C: guides/i2c-scan.md
      - SPI: guides/spi-loopback.md
      - PWM: guides/pwm-basic.md
      - ADC: guides/adc-basic.md
      - Timer: guides/timer-basic.md
      - Hardware Smoke Tests: guides/hardware-smoke-tests.md
  - API Reference:
      - System: modules/system.md
      - GPIO: modules/gpio.md
      - UART: modules/uart.md
      - I2C Master: modules/i2c.md
      - SPI Master: modules/spi.md
      - PWM: modules/pwm.md
      - ADC: modules/adc.md
      - Timer: modules/timer.md
  - Compatibility: target-matrix.md
  - Contributing: contributing.md
