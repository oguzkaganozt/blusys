          - WiFi Provisioning: services/wifi_prov.md
          - WiFi Mesh: services/wifi_mesh.md
          - ESP-NOW: services/espnow.md
          - Bluetooth: services/bluetooth.md
          - BLE GATT: services/ble_gatt.md
          - mDNS: services/mdns.md
      - Protocol:
          - HTTP: services/http.md
          - MQTT: services/mqtt.md
          - WebSocket: services/ws_client.md
      - Display & Input:
          - UI (LVGL): services/ui.md
          - USB HID: services/usb_hid.md
      - System:
          - Console: services/console.md
          - Filesystem: services/fs.md
          - FAT Filesystem: services/fatfs.md
          - Local Control: services/local_ctrl.md
          - Power Management: services/power_mgmt.md
          - SNTP: services/sntp.md
          - OTA: services/ota.md
  - HAL + Drivers:
      - hal/index.md
      - I/O & Communication:
          - GPIO: hal/gpio.md
          - UART: hal/uart.md
          - I2C: hal/i2c.md
          - SPI: hal/spi.md
          - TWAI: hal/twai.md
          - I2S: hal/i2s.md
          - RMT: hal/rmt.md
          - 1-Wire: hal/one_wire.md
