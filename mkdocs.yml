          - MCPWM: hal/mcpwm.md
      - Storage:
          - NVS: hal/nvs.md
          - SD/MMC: hal/sdmmc.md
          - SD over SPI: hal/sd_spi.md
      - Device:
          - System: hal/system.md
          - Sleep: hal/sleep.md
          - Watchdog: hal/wdt.md
          - Temp Sensor: hal/temp_sensor.md
          - eFuse: hal/efuse.md
          - ULP: hal/ulp.md
          - USB Host: hal/usb_host.md
          - USB Device: hal/usb_device.md
      - Drivers:
          - LCD: hal/lcd.md
          - LED Strip: hal/led_strip.md
          - 7-Segment: hal/seven_seg.md
          - Button: hal/button.md
          - Encoder: hal/encoder.md
          - DHT: hal/dht.md
          - Buzzer: hal/buzzer.md
  - Internals:
