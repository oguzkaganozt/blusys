site_name: Blusys HAL
site_description: Simplified ESP32 HAL on top of ESP-IDF v5.5
site_dir: site
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Vision: vision.md
  - Architecture: architecture.md
  - API Design Rules: api-design-rules.md
  - Target Matrix: target-matrix.md
  - Roadmap: roadmap.md
  - Testing Strategy: testing-strategy.md
  - Development Workflow: development-workflow.md
  - Documentation Standards: documentation-standards.md
  - Guides:
      - Getting Started: guides/getting-started.md
  - Modules:
      - Overview: modules/index.md
      - V1 Core Modules: modules/v1-core.md
